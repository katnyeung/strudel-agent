<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient Lo-fi — AI Music Copilot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25;
    --border: #2a2a3a; --text: #e0e0ee; --dim: #888899;
    --accent: #7c5cfc; --accent2: #5c8cfc; --green: #4ade80;
    --orange: #fb923c; --red: #f87171;
  }
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; }
  .repl-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
  .copilot-panel { width: 380px; display: flex; flex-direction: column; background: var(--surface); }

  /* ── REPL Header ── */
  .repl-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .repl-header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
  .repl-header .status { font-size: 11px; color: var(--dim); margin-left: auto; }
  .stop-btn { background: var(--surface2); color: var(--dim); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }

  /* ── Strudel Editor ── */
  .editor-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); min-height: 0; }
  .editor-wrap strudel-editor {
    display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  }
  /* ── Tetris Panel ── */
  .tetris-wrap {
    height: 340px; min-height: 200px; border-top: 1px solid var(--border);
    background: var(--surface); display: flex; flex-direction: column; align-items: center;
    padding: 8px 8px 4px;
  }
  .tetris-wrap canvas { display: block; }
  .tetris-controls {
    display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 11px; color: var(--dim);
  }
  .tetris-controls label { white-space: nowrap; }
  .tetris-controls input[type="range"] {
    width: 80px; -webkit-appearance: none; appearance: none; height: 3px;
    background: var(--border); border-radius: 2px; outline: none;
  }
  .tetris-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  .tetris-controls input[type="checkbox"] { accent-color: var(--accent); }

  /* Force CodeMirror inside strudel-editor to fill (light DOM case) */
  strudel-editor .cm-editor { height: 100% !important; }
  strudel-editor .cm-scroller { overflow: auto !important; }
  /* Wrap long lines instead of horizontal scroll */
  strudel-editor .cm-content { white-space: pre-wrap !important; word-break: break-all !important; }
  strudel-editor .cm-line { white-space: pre-wrap !important; word-break: break-all !important; }

  /* ── Copilot Header ── */
  .copilot-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .copilot-header h2 { font-size: 13px; font-weight: 600; color: var(--accent2); }
  .copilot-header .sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* ── Skill Picker ── */
  .skill-picker { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .skill-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
    font-family: inherit; transition: all 0.2s;
  }
  .skill-btn:hover { border-color: var(--accent); color: var(--accent); }
  .skill-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Evolution Controls ── */
  .evolve-controls { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border); }
  .evolve-controls label { font-size: 11px; color: var(--dim); white-space: nowrap; }
  .evolve-controls input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 4px;
    background: var(--border); border-radius: 2px; outline: none;
  }
  .evolve-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  .evolve-controls .evolve-val { font-size: 11px; color: var(--text); min-width: 28px; text-align: right; }
  .evolve-now-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--green);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
    font-family: inherit; white-space: nowrap;
  }
  .evolve-now-btn:hover { border-color: var(--green); }

  /* ── Agent Log ── */
  .agent-log { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .log-entry { font-size: 12px; line-height: 1.5; padding: 8px 10px; border-radius: 8px; background: var(--surface2); }
  .log-entry.thinking { border-left: 3px solid var(--orange); color: var(--orange); }
  .log-entry.code-update { border-left: 3px solid var(--green); }
  .log-entry.info { border-left: 3px solid var(--accent2); }
  .log-entry.error { border-left: 3px solid var(--red); color: var(--red); }
  .log-entry .phase-tag {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px;
    margin-right: 6px; font-weight: 600; text-transform: uppercase;
  }
  .phase-bootstrap { background: #7c5cfc33; color: var(--accent); }
  .phase-evolving { background: #4ade8033; color: var(--green); }
  .phase-responding { background: #5c8cfc33; color: var(--accent2); }
  .log-entry .candidate-bar { margin-top: 4px; height: 3px; background: var(--border); border-radius: 2px; }
  .log-entry .candidate-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* ── Rating ── */
  .rating-bar { display: flex; gap: 4px; padding: 8px 16px; border-bottom: 1px solid var(--border); align-items: center; }
  .rating-bar span { font-size: 11px; color: var(--dim); margin-right: 8px; }
  .rate-btn { background: var(--surface2); border: 1px solid var(--border); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .rate-btn:hover { border-color: var(--accent); }

  /* ── Voice Ratings ── */
  .voice-ratings { border-bottom: 1px solid var(--border); }
  .voice-ratings-header {
    display: flex; align-items: center; padding: 6px 16px; cursor: pointer;
    font-size: 11px; color: var(--dim); user-select: none;
  }
  .voice-ratings-header:hover { color: var(--text); }
  .voice-ratings-list { padding: 4px 16px 8px; display: flex; flex-direction: column; gap: 4px; }
  .voice-row {
    display: flex; align-items: center; gap: 6px; font-size: 11px;
  }
  .voice-row .voice-name { color: var(--accent); min-width: 60px; font-weight: 600; }
  .voice-row .voice-type { color: var(--dim); font-size: 10px; min-width: 48px; }
  .voice-row .vr-btn {
    width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; font-size: 12px; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .voice-row .vr-btn:hover { border-color: var(--accent); }
  .voice-row .vr-btn.active-bad { border-color: var(--red); background: #f8717122; }
  .voice-row .vr-btn.active-ok { border-color: var(--orange); background: #fb923c22; }
  .voice-row .vr-btn.active-good { border-color: var(--green); background: #4ade8022; }

  /* ── Chat Input ── */
  .chat-input { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface2); }
  .chat-input input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 12px; font-family: inherit; outline: none;
  }
  .chat-input input:focus { border-color: var(--accent); }
  .chat-input button {
    background: var(--accent); color: #fff; border: none; padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: Strudel REPL -->
  <div class="repl-panel">
    <div class="repl-header">
      <h1>🎵 Ambient Lo-fi</h1>
      <button class="stop-btn" onclick="syncCode()" title="Send your edits to the agent">✔ Sync</button>
      <button class="stop-btn" onclick="stopAll()">⏹ Stop</button>
      <span class="status" id="statusText">Disconnected</span>
    </div>
    <div class="editor-wrap">
      <strudel-editor id="strudelEditor">
<!--
// Select a skill on the right to start.
// The AI copilot will generate patterns and evolve them.
// You can edit the code directly — Ctrl+Enter to evaluate.
// Press the play button (top-left) to start audio.
-->
      </strudel-editor>
    </div>
    <div class="tetris-wrap" id="tetrisWrap">
      <canvas id="tetrisCanvas"></canvas>
      <div class="tetris-controls">
        <label>Speed:</label>
        <input type="range" id="tetrisSpeed" min="200" max="10000" value="600" step="100"
               oninput="onTetrisSpeed(this.value)">
        <span id="tetrisSpeedVal">600ms</span>
        <label>Combo:</label>
        <input type="range" id="comboThreshold" min="1" max="5" value="3" step="1"
               oninput="onComboThreshold(this.value)">
        <span id="comboThresholdVal">3</span>
        <label><input type="checkbox" id="tetrisAutoReset" checked onchange="onTetrisAutoReset(this.checked)"> Auto-reset</label>
        <label><input type="checkbox" id="tetrisRandomSpeed" onchange="onRandomSpeedToggle(this.checked)"> Randomize</label>
      </div>
    </div>
  </div>

  <!-- RIGHT: Copilot -->
  <div class="copilot-panel">
    <div class="copilot-header">
      <h2>🤖 Copilot Agent</h2>
      <div class="sub">Generates • Evaluates • Evolves</div>
    </div>

    <div class="skill-picker" id="skillPicker">
      <!-- Filled by WebSocket -->
    </div>

    <div class="evolve-controls">
      <label><input type="checkbox" id="evolveToggle" onchange="onEvolveToggle(this.checked)"> Evolve:</label>
      <input type="range" id="evolveSlider" min="10" max="120" value="60" oninput="onEvolveSlider(this.value)" disabled>
      <span class="evolve-val" id="evolveVal">off</span>
      <button class="evolve-now-btn" onclick="evolveNow()" id="evolveNowBtn" disabled>⚡ Now</button>
    </div>

    <div class="rating-bar">
      <span>Rate:</span>
      <button class="rate-btn" onclick="rate(1)" title="Bad">👎</button>
      <button class="rate-btn" onclick="rate(2)" title="Meh">😐</button>
      <button class="rate-btn" onclick="rate(3)" title="OK">👌</button>
      <button class="rate-btn" onclick="rate(4)" title="Good">👍</button>
      <button class="rate-btn" onclick="rate(5)" title="Love it">🔥</button>
    </div>

    <div class="voice-ratings" id="voiceRatings">
      <div class="voice-ratings-header" onclick="toggleVoiceRatings()">
        <span id="voiceRatingsToggle">Rate voices ▸</span>
      </div>
      <div class="voice-ratings-list" id="voiceRatingsList" style="display:none;"></div>
    </div>

    <div class="agent-log" id="agentLog"></div>

    <div class="chat-input">
      <input id="chatInput" type="text" placeholder="Tell the agent what to change..."
             onkeydown="if(event.key==='Enter')sendCommand()">
      <button onclick="sendCommand()">Send</button>
    </div>
  </div>
</div>

<!-- Tetris game engine -->
<script src="tetris.js"></script>

<!-- Strudel REPL web component — includes CodeMirror editor, pianoroll, mini-notation highlighting -->
<script src="https://unpkg.com/@strudel/repl@1.2.9"></script>
<script>
// Load dirt-samples (includes piano, gm_epiano1, gm_epiano2, etc.)
function loadDirtSamples() {
  if (typeof samples === 'function') {
    samples('github:tidalcycles/dirt-samples');
    console.log('[samples] dirt-samples loaded (piano, epiano, etc.)');
  } else {
    setTimeout(loadDirtSamples, 500);
  }
}
setTimeout(loadDirtSamples, 1000);
</script>
<script>
const strudelEl = document.getElementById('strudelEditor');
let isPlaying = false;

// Force strudel-editor to fill its container with explicit pixel height
// (CodeMirror 6 doesn't fill flex parents automatically)
const editorWrap = document.querySelector('.editor-wrap');
function syncEditorHeight() {
  if (editorWrap && strudelEl) {
    strudelEl.style.height = editorWrap.clientHeight + 'px';
    // Also try to reach CodeMirror inside (light DOM)
    const cm = strudelEl.querySelector?.('.cm-editor');
    if (cm) cm.style.height = '100%';
  }
}
new ResizeObserver(syncEditorHeight).observe(editorWrap);
// Initial sync after component loads
setTimeout(syncEditorHeight, 500);
setTimeout(syncEditorHeight, 2000);

// Wait for the strudel-editor web component to initialize its .editor (StrudelMirror)
function getEditor() {
  return strudelEl?.editor || null;
}

function waitForEditor() {
  return new Promise((resolve) => {
    const check = () => {
      const ed = getEditor();
      if (ed) { resolve(ed); return; }
      setTimeout(check, 200);
    };
    check();
  });
}

// Get current code from the CodeMirror editor
function getCurrentCode() {
  const ed = getEditor();
  if (!ed) return '';
  // StrudelMirror exposes code via .code or via the CodeMirror view
  if (typeof ed.code === 'string') return ed.code;
  try { return ed.view?.state?.doc?.toString() || ''; } catch { return ''; }
}

// Set code + evaluate (play)
let _evalDebounce = null;
window.strudelPlay = async function(code) {
  const ed = await waitForEditor();
  try {
    ed.setCode(code);
    if (!isPlaying) {
      // First play: hush stale state, evaluate immediately
      try { hush(); } catch(e) {}
      ed.evaluate();
      isPlaying = true;
    } else {
      // Subsequent updates: debounce to reduce scheduler hiccups.
      // Short delay lets the current cycle's events finish scheduling.
      if (_evalDebounce) clearTimeout(_evalDebounce);
      _evalDebounce = setTimeout(() => {
        try { ed.evaluate(); } catch(e) { console.warn('[strudel] re-eval error:', e); }
        _evalDebounce = null;
      }, 100);
    }
    console.log('[strudel] playing');
  } catch (e) {
    console.error('[strudel] eval error:', e);
    addLog('Strudel error: ' + e.message, 'error');
  }
};

window.strudelStop = function() {
  const ed = getEditor();
  if (ed) {
    try { ed.stop(); } catch (e) { console.warn('[strudel] stop error:', e); }
  }
  isPlaying = false;
};

window.syncCode = function() {
  const code = getCurrentCode();
  if (!code) return;
  lastCode = code;
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'code_edit', currentCode: code }));
  }
  addLog('Synced your edits — agent will use this as the latest version.', 'info');
  if (voiceRatingsOpen) refreshVoiceList();
};

window.stopAll = function() {
  strudelStop();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'stop' }));
};

// Detect manual edits — debounced auto-evaluate + sync
let lastCode = '';
let editDebounce = null;

setInterval(() => {
  const code = getCurrentCode();
  if (code && code !== lastCode) {
    lastCode = code;
    // Sync edit to server immediately
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'code_edit', currentCode: code }));
    }
    // Debounce auto-evaluate: play after 1.5s of no further changes
    if (editDebounce) clearTimeout(editDebounce);
    editDebounce = setTimeout(() => {
      const ed = getEditor();
      if (ed && isPlaying) {
        try {
          ed.evaluate();
          console.log('[strudel] auto-evaluated user edit');
        } catch (e) {
          console.warn('[strudel] auto-eval error:', e);
        }
      }
    }, 1500);
  }
}, 500);
</script>

<script>
// ══════════════════════════════════════════════════
// WebSocket
// ══════════════════════════════════════════════════
let ws;
let activeSkill = null;
const WS_URL = `ws://${location.hostname}:8080/ws/agent`;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('statusText').textContent = 'Connected';
    document.getElementById('statusText').style.color = '#4ade80';
  };
  ws.onclose = () => {
    document.getElementById('statusText').textContent = 'Disconnected — reconnecting...';
    document.getElementById('statusText').style.color = '#f87171';
    setTimeout(connect, 3000);
  };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'skills_list':
      renderSkills(msg.skills);
      if (msg.message) addLog(msg.message, 'info');
      break;

    case 'code_update':
      if (msg.code) {
        lastCode = msg.code; // prevent echo back to server
        window.strudelPlay(msg.code).catch(e => addLog('Strudel error: ' + e.message, 'error'));
        // Reset voice ratings on each code update — old ratings are stale
        Object.keys(activeVoiceRatings).forEach(k => delete activeVoiceRatings[k]);
        if (voiceRatingsOpen) refreshVoiceList();
      }
      if (msg.message) addLog(msg.message, 'code-update', msg.phase);
      break;

    case 'thinking':
      addLog(msg.message || 'Thinking...', 'thinking', msg.phase, msg.candidateNum, msg.candidateTotal);
      break;

    case 'agent_log':
      addLog(msg.message, 'info', msg.phase);
      break;

    case 'error':
      addLog(msg.message || 'Something went wrong', 'error');
      break;

    case 'tetris_next_piece':
      if (tetris && msg.pieceKey) tetris.setNextPiece(msg.pieceKey);
      break;

    case 'tetris_spawn_piece':
      if (tetris && msg.pieceKey) tetris.spawnPiece(msg.pieceKey);
      break;

    case 'tetris_remove_voice':
      if (tetris && msg.voiceName) tetris.removeVoice(msg.voiceName);
      break;

    case 'tetris_set_speed':
      if (tetris && msg.speedMs) {
        tetris.setSpeed(msg.speedMs);
        document.getElementById('tetrisSpeed').value = msg.speedMs;
        document.getElementById('tetrisSpeedVal').textContent = msg.speedMs + 'ms';
      }
      break;

    case 'vocal_ready':
      if (msg.sampleUrl) registerVocalSample(msg.sampleUrl, msg.sampleName || 'vocal');
      addLog(`Vocal: "${msg.word}" loaded as ${msg.sampleName || 'vocal'}`, 'info');
      break;
  }
}

// ══════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════

function renderSkills(skills) {
  const picker = document.getElementById('skillPicker');
  picker.innerHTML = '';
  skills.forEach(sk => {
    const btn = document.createElement('button');
    btn.className = 'skill-btn';
    btn.textContent = sk.icon + ' ' + sk.name;
    btn.title = sk.description;
    btn.onclick = () => selectSkill(sk.id, btn);
    picker.appendChild(btn);
  });
}

function selectSkill(id, btn) {
  activeSkill = id;
  document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ws.send(JSON.stringify({ type: 'select_skill', skillId: id }));
  initTetris();
}

function sendCommand() {
  const input = document.getElementById('chatInput');
  const cmd = input.value.trim();
  if (!cmd || !ws || ws.readyState !== 1) return;

  addLog('You: ' + cmd, 'info');
  ws.send(JSON.stringify({
    type: 'command',
    command: cmd,
    currentCode: getCurrentCode()
  }));
  input.value = '';
}

function rate(r) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'rate', rating: r }));
  }
}

function onEvolveToggle(enabled) {
  document.getElementById('evolveSlider').disabled = !enabled;
  document.getElementById('evolveNowBtn').disabled = !enabled;
  document.getElementById('evolveVal').textContent = enabled
    ? document.getElementById('evolveSlider').value + 's'
    : 'off';
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'toggle_evolve', enabled }));
  }
}

function onEvolveSlider(val) {
  document.getElementById('evolveVal').textContent = val + 's';
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_evolve_interval', interval: val * 1000 }));
  }
}

function evolveNow() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'evolve_now' }));
  }
}

// ══════════════════════════════════════════════════
// Voice Ratings
// ══════════════════════════════════════════════════

const VOICE_NAME_TYPE = {
  kick:'drum',bd:'drum',snare:'drum',sd:'drum',hat:'drum',hh:'drum',
  perc:'drum',rim:'drum',clap:'drum',cymbal:'drum',tom:'drum',
  chord:'synth',pad:'synth',keys:'synth',piano:'synth',
  melody:'melodic',lead:'melodic',arp:'melodic',pluck:'melodic',
  bass:'bass',sub:'bass',fx:'fx',noise:'fx',ambient:'fx',
};

let voiceRatingsOpen = false;
const activeVoiceRatings = {};  // voiceName → rating

function toggleVoiceRatings() {
  voiceRatingsOpen = !voiceRatingsOpen;
  document.getElementById('voiceRatingsList').style.display = voiceRatingsOpen ? 'flex' : 'none';
  document.getElementById('voiceRatingsToggle').textContent = voiceRatingsOpen ? 'Rate voices ▾' : 'Rate voices ▸';
  if (voiceRatingsOpen) refreshVoiceList();
}

function parseVoicesClient(code) {
  if (!code) return [];
  const voices = [];
  for (const m of code.matchAll(/\$(\w+):/g)) {
    const name = m[1];
    const lower = name.toLowerCase();
    let type = 'unknown';
    for (const [k, t] of Object.entries(VOICE_NAME_TYPE)) {
      if (lower.includes(k)) { type = t; break; }
    }
    voices.push({ name, type });
  }
  return voices;
}

function refreshVoiceList() {
  const list = document.getElementById('voiceRatingsList');
  const code = getCurrentCode();
  const voices = parseVoicesClient(code);
  if (voices.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:var(--dim)">No voices yet</div>';
    return;
  }
  // Remove stale ratings
  const names = new Set(voices.map(v => v.name));
  for (const k of Object.keys(activeVoiceRatings)) {
    if (!names.has(k)) delete activeVoiceRatings[k];
  }
  list.innerHTML = voices.map(v => {
    const cur = activeVoiceRatings[v.name] || 0;
    return `<div class="voice-row">
      <span class="voice-name">$${v.name}</span>
      <span class="voice-type">${v.type}</span>
      <button class="vr-btn ${cur===1?'active-bad':''}" onclick="rateVoice('${v.name}',1)" title="Bad">👎</button>
      <button class="vr-btn ${cur===3?'active-ok':''}" onclick="rateVoice('${v.name}',3)" title="OK">👌</button>
      <button class="vr-btn ${cur===5?'active-good':''}" onclick="rateVoice('${v.name}',5)" title="Good">👍</button>
    </div>`;
  }).join('');
}

function rateVoice(name, rating) {
  // Toggle off if same rating clicked again
  if (activeVoiceRatings[name] === rating) {
    delete activeVoiceRatings[name];
  } else {
    activeVoiceRatings[name] = rating;
  }
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'rate', rating, voiceName: name }));
  }
  refreshVoiceList();
}

function addLog(message, type, phase, candidateNum, candidateTotal) {
  const log = document.getElementById('agentLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (type || 'info');

  let html = '';
  if (phase) {
    html += `<span class="phase-tag phase-${phase}">${phase}</span>`;
  }
  html += message;

  if (candidateNum && candidateTotal) {
    const pct = Math.round((candidateNum / candidateTotal) * 100);
    html += `<div class="candidate-bar"><div class="candidate-fill" style="width:${pct}%"></div></div>`;
  }

  entry.innerHTML = html;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;

  // Keep log manageable
  while (log.children.length > 100) log.removeChild(log.firstChild);
}

// ══════════════════════════════════════════════════
// Vocal Sample Registration
// ══════════════════════════════════════════════════

function registerVocalSample(sampleUrl, sampleName) {
  sampleName = sampleName || 'vocal';
  // Build absolute URL from relative path
  const absUrl = new URL(sampleUrl, location.origin).href;
  // Register via Strudel's global samples() — makes s("vocal0") etc. work in patterns
  try {
    if (typeof samples === 'function') {
      samples({ [sampleName]: absUrl });
      console.log(`[vocal] Registered ${sampleName}:`, absUrl);
    } else {
      console.warn('[vocal] samples() not available yet');
    }
  } catch (e) {
    console.error('[vocal] Failed to register sample:', e);
  }
}

// ══════════════════════════════════════════════════
// Tetris Integration
// ══════════════════════════════════════════════════

let tetris = null;

function initTetris() {
  if (tetris) { tetris.destroy(); tetris = null; }
  const canvas = document.getElementById('tetrisCanvas');
  tetris = new MusicTetris(canvas, {
    speedMs: parseInt(document.getElementById('tetrisSpeed').value) || 600,
    autoReset: document.getElementById('tetrisAutoReset').checked,
    onPieceLand(constraints) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'tetris_state', constraints }));
      }
    },
    onCombo(comboCount) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'tetris_combo', comboCount }));
      }
      addLog(`COMBO x${comboCount}! Generating vocal...`, 'info');
    },
    onGameOver() {
      addLog('Tetris: MIX OVERFLOW — board full', 'info');
    },
    onConstraintsChange(constraints) {
      // Called on removeVoice — also sent via onPieceLand
    },
  });
  tetris.start();
}

function onTetrisSpeed(val) {
  document.getElementById('tetrisSpeedVal').textContent = val + 'ms';
  if (tetris) tetris.setSpeed(parseInt(val));
}

function onRandomSpeedToggle(checked) {
  const slider = document.getElementById('tetrisSpeed');
  slider.disabled = checked;
  slider.style.opacity = checked ? '0.4' : '1';
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'tetris_random_speed', enabled: checked }));
  }
}

function onTetrisAutoReset(checked) {
  if (tetris) tetris.setAutoReset(checked);
}

function onComboThreshold(val) {
  document.getElementById('comboThresholdVal').textContent = val;
  if (tetris) tetris.setComboThreshold(parseInt(val));
}

// Auto-connect
connect();
