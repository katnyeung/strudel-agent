<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient Lo-fi — AI Music Copilot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25;
    --border: #2a2a3a; --text: #e0e0ee; --dim: #888899;
    --accent: #7c5cfc; --accent2: #5c8cfc; --green: #4ade80;
    --orange: #fb923c; --red: #f87171;
  }
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; }
  .repl-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
  .copilot-panel { width: 380px; display: flex; flex-direction: column; background: var(--surface); }

  /* ── REPL Header ── */
  .repl-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .repl-header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
  .repl-header .status { font-size: 11px; color: var(--dim); margin-left: auto; }
  .play-btn { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .play-btn:hover { opacity: 0.9; }
  .play-btn.playing { background: var(--red); }
  .stop-btn { background: var(--surface2); color: var(--dim); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }

  /* ── Strudel Editor ── */
  .editor-wrap { flex: 1; position: relative; overflow: hidden; }
  .editor-wrap textarea {
    width: 100%; height: 100%; background: var(--bg); color: var(--green);
    border: none; padding: 16px; font-size: 13px; line-height: 1.6;
    font-family: inherit; resize: none; outline: none; tab-size: 2;
  }

  /* ── Copilot Header ── */
  .copilot-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .copilot-header h2 { font-size: 13px; font-weight: 600; color: var(--accent2); }
  .copilot-header .sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* ── Skill Picker ── */
  .skill-picker { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .skill-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
    font-family: inherit; transition: all 0.2s;
  }
  .skill-btn:hover { border-color: var(--accent); color: var(--accent); }
  .skill-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Agent Log ── */
  .agent-log { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .log-entry { font-size: 12px; line-height: 1.5; padding: 8px 10px; border-radius: 8px; background: var(--surface2); }
  .log-entry.thinking { border-left: 3px solid var(--orange); color: var(--orange); }
  .log-entry.code-update { border-left: 3px solid var(--green); }
  .log-entry.info { border-left: 3px solid var(--accent2); }
  .log-entry.error { border-left: 3px solid var(--red); color: var(--red); }
  .log-entry .phase-tag {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px;
    margin-right: 6px; font-weight: 600; text-transform: uppercase;
  }
  .phase-bootstrap { background: #7c5cfc33; color: var(--accent); }
  .phase-evolving { background: #4ade8033; color: var(--green); }
  .phase-responding { background: #5c8cfc33; color: var(--accent2); }
  .log-entry .candidate-bar { margin-top: 4px; height: 3px; background: var(--border); border-radius: 2px; }
  .log-entry .candidate-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* ── Rating ── */
  .rating-bar { display: flex; gap: 4px; padding: 8px 16px; border-bottom: 1px solid var(--border); align-items: center; }
  .rating-bar span { font-size: 11px; color: var(--dim); margin-right: 8px; }
  .rate-btn { background: var(--surface2); border: 1px solid var(--border); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .rate-btn:hover { border-color: var(--accent); }

  /* ── Chat Input ── */
  .chat-input { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface2); }
  .chat-input input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 12px; font-family: inherit; outline: none;
  }
  .chat-input input:focus { border-color: var(--accent); }
  .chat-input button {
    background: var(--accent); color: #fff; border: none; padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: Strudel REPL -->
  <div class="repl-panel">
    <div class="repl-header">
      <h1>🎵 Ambient Lo-fi</h1>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
      <button class="stop-btn" onclick="stopAll()">⏹ Stop</button>
      <span class="status" id="statusText">Disconnected</span>
    </div>
    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false" placeholder="// Select a skill to start, or type code here...

// The AI copilot will generate patterns and evolve them.
// You can edit the code directly — changes are live!
"></textarea>
    </div>
  </div>

  <!-- RIGHT: Copilot -->
  <div class="copilot-panel">
    <div class="copilot-header">
      <h2>🤖 Copilot Agent</h2>
      <div class="sub">Generates • Evaluates • Evolves</div>
    </div>

    <div class="skill-picker" id="skillPicker">
      <!-- Filled by WebSocket -->
    </div>

    <div class="rating-bar">
      <span>Rate:</span>
      <button class="rate-btn" onclick="rate(1)" title="Bad">👎</button>
      <button class="rate-btn" onclick="rate(2)" title="Meh">😐</button>
      <button class="rate-btn" onclick="rate(3)" title="OK">👌</button>
      <button class="rate-btn" onclick="rate(4)" title="Good">👍</button>
      <button class="rate-btn" onclick="rate(5)" title="Love it">🔥</button>
    </div>

    <div class="agent-log" id="agentLog"></div>

    <div class="chat-input">
      <input id="chatInput" type="text" placeholder="Tell the agent what to change..." 
             onkeydown="if(event.key==='Enter')sendCommand()">
      <button onclick="sendCommand()">Send</button>
    </div>
  </div>
</div>

<!-- Strudel via @strudel/web -->
<script src="https://unpkg.com/@strudel/web@latest"></script>
<script>
let strudelReady = false;
let isPlaying = false;
const editor = document.getElementById('editor');
const playBtn = document.getElementById('playBtn');

// Initialize Strudel
async function initStrudelEngine() {
  try {
    await initStrudel({
      prebake: () => samples('github:tidalcycles/dirt-samples'),
    });
    strudelReady = true;
    console.log('[strudel] initialized');
  } catch (e) {
    console.error('[strudel] init failed:', e);
  }
}

// Play code via evaluate()
window.strudelPlay = async function(code) {
  if (!strudelReady) await initStrudelEngine();
  try {
    editor.value = code;
    await evaluate(code);
    isPlaying = true;
    playBtn.textContent = '⏸ Pause';
    playBtn.classList.add('playing');
  } catch (e) {
    console.error('[strudel] eval error:', e);
    addLog('Strudel error: ' + e.message, 'error');
  }
};

window.strudelStop = function() {
  try {
    hush();
  } catch (e) {
    console.warn('[strudel] stop error:', e);
  }
  isPlaying = false;
  playBtn.textContent = '▶ Play';
  playBtn.classList.remove('playing');
};

window.togglePlay = async function() {
  if (isPlaying) {
    strudelStop();
  } else {
    const code = editor.value.trim();
    if (code) await strudelPlay(code);
  }
};

window.stopAll = function() {
  strudelStop();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'stop' }));
};

// Manual play from editor (Ctrl+Enter)
editor.addEventListener('keydown', async (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    await strudelPlay(editor.value.trim());
  }
});

// Detect manual edits
let editTimer;
editor.addEventListener('input', () => {
  clearTimeout(editTimer);
  editTimer = setTimeout(() => {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'code_edit', currentCode: editor.value }));
    }
  }, 1000);
});
</script>

<script>
// ══════════════════════════════════════════════════
// WebSocket
// ══════════════════════════════════════════════════
let ws;
let activeSkill = null;
const WS_URL = `ws://${location.hostname}:8080/ws/agent`;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('statusText').textContent = 'Connected';
    document.getElementById('statusText').style.color = '#4ade80';
  };
  ws.onclose = () => {
    document.getElementById('statusText').textContent = 'Disconnected — reconnecting...';
    document.getElementById('statusText').style.color = '#f87171';
    setTimeout(connect, 3000);
  };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'skills_list':
      renderSkills(msg.skills);
      if (msg.message) addLog(msg.message, 'info');
      break;

    case 'code_update':
      // Always show code in editor, even if Strudel isn't loaded
      if (msg.code) {
        document.getElementById('editor').value = msg.code;
        if (typeof window.strudelPlay === 'function') {
          window.strudelPlay(msg.code).catch(e => addLog('Strudel error: ' + e.message, 'error'));
        } else {
          addLog('Strudel REPL not loaded — code shown but not playing. Check browser console.', 'error');
        }
      }
      if (msg.message) addLog(msg.message, 'code-update', msg.phase);
      break;

    case 'thinking':
      addLog(msg.message || 'Thinking...', 'thinking', msg.phase, msg.candidateNum, msg.candidateTotal);
      break;

    case 'agent_log':
      addLog(msg.message, 'info', msg.phase);
      break;

    case 'error':
      addLog(msg.message || 'Something went wrong', 'error');
      break;
  }
}

// ══════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════

function renderSkills(skills) {
  const picker = document.getElementById('skillPicker');
  picker.innerHTML = '';
  skills.forEach(sk => {
    const btn = document.createElement('button');
    btn.className = 'skill-btn';
    btn.textContent = sk.icon + ' ' + sk.name;
    btn.title = sk.description;
    btn.onclick = () => selectSkill(sk.id, btn);
    picker.appendChild(btn);
  });
}

function selectSkill(id, btn) {
  activeSkill = id;
  document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ws.send(JSON.stringify({ type: 'select_skill', skillId: id }));
}

function sendCommand() {
  const input = document.getElementById('chatInput');
  const cmd = input.value.trim();
  if (!cmd || !ws || ws.readyState !== 1) return;

  addLog('You: ' + cmd, 'info');
  ws.send(JSON.stringify({
    type: 'command',
    command: cmd,
    currentCode: document.getElementById('editor').value
  }));
  input.value = '';
}

function rate(r) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'rate', rating: r }));
  }
}

function addLog(message, type, phase, candidateNum, candidateTotal) {
  const log = document.getElementById('agentLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (type || 'info');

  let html = '';
  if (phase) {
    html += `<span class="phase-tag phase-${phase}">${phase}</span>`;
  }
  html += message;

  if (candidateNum && candidateTotal) {
    const pct = Math.round((candidateNum / candidateTotal) * 100);
    html += `<div class="candidate-bar"><div class="candidate-fill" style="width:${pct}%"></div></div>`;
  }

  entry.innerHTML = html;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;

  // Keep log manageable
  while (log.children.length > 100) log.removeChild(log.firstChild);
}

// Auto-connect
connect();
</script>
</body>
</html>
