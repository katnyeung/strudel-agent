# Build Sequence — Soul Keys

steps:
  - stage: foundation
    description: "Rich chord progression on Rhodes-like sound"
    code: |
      $keys: chord("<Ebmaj7 Abmaj7 Fm7 Bb7>").voicing().sound("sawtooth").slow(4).lpf(1200).room(0.6).gain(0.35)

  - stage: bass
    description: "Walking bass through chord tones"
    code: |
      $bass: note("Eb2 ~ F2 G2 ~ Ab2 G2 ~").sound("triangle").slow(2).lpf(400).gain(0.45)

  - stage: groove
    description: "Laid-back drum groove"
    code: |
      $kick: sound("bd:1").beat("0,6,10,14",16).bank("RolandTR808").swing(0.2).gain(0.5).lpf(1800)

  - stage: snare
    description: "Snare with ghost notes"
    code: |
      $snare: sound("sd:2").beat("4,12",16).bank("RolandTR808").swing(0.2).gain(0.35).room(0.3)

  - stage: texture
    description: "Rim clicks for pocket"
    code: |
      $rim: s("~ rim ~ rim").bank("RolandTR808").gain(0.15).degradeBy(0.3)

  - stage: refine
    description: "Add warmth — more filter movement, delay, subtle effects"

  - stage: variation
    description: "Modulate — key change, new voicing, tempo shift"
