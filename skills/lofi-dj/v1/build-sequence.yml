# Build Sequence — Lo-fi DJ

steps:
  - stage: foundation
    description: "Start with warm chord pad — the emotional center"
    code: |
      $chord: note("<C3 Eb3 G3 Bb3> <F3 Ab3 C4 Eb4> <Ab3 C4 Eb4 G4> <G3 Bb3 D4 F4>").sound("sawtooth").slow(4).lpf(sine.range(500,1200).slow(8)).gain(0.3).room(0.65)

  - stage: bass
    description: "Add simple bass line — anchor the harmony"
    code: |
      $bass: note("C2 ~ C2 ~ Eb2 ~ F2 ~").sound("triangle").lpf(350).gain(0.4)

  - stage: groove
    description: "Add kick with syncopated lo-fi feel"
    code: |
      $kick: sound("bd:1").beat("0,4,6,10",16).bank("RolandTR808").gain(rand.range(0.55, 0.65)).lpf(2000).swing(0.2)

  - stage: snare
    description: "Add snare hits"
    code: |
      $snare: sound("sd:2").beat("4,12",16).bank("RolandTR808").gain(0.45).room(0.3).swing(0.2)

  - stage: texture
    description: "Add hi-hats with randomness — shimmer and dust"
    code: |
      $hat: s("hh*8").gain(perlin.range(0.1,0.25)).degradeBy(0.15).lpf(3500).pan(sine.range(0.3,0.7).slow(4)).swing(0.2)

  - stage: refine
    description: "Add dust and character — more reverb, filter movement"

  - stage: variation
    description: "Evolve — change voicing, modulate, add/remove elements"